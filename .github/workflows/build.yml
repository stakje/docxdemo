name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet tool restore
      - run: dotnet restore DocVista.sln
      - run: dotnet build DocVista.sln -c Release --no-restore
      - run: dotnet run --project tests/DocVista.Tests/DocVista.Tests.csproj -c Release --no-build
      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: .\scripts\package.ps1 -Version $env:GITHUB_REF_NAME.TrimStart('v')
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: DocVista-Setup
          path: artifacts/installer/DocVista-win-Setup.exe
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = @('artifacts/installer/DocVista-win-Setup.exe')
          gh release create $env:GITHUB_REF_NAME @files --title $env:GITHUB_REF_NAME --generate-notes
