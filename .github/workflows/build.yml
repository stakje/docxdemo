name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet tool restore
      - run: dotnet restore DocVista.sln
      - run: dotnet build DocVista.sln -c Release --no-restore
      - run: dotnet run --project tests/DocVista.Tests/DocVista.Tests.csproj -c Release --no-build
      - name: Download previous release
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download --pattern "DocVista-*-full.nupkg" --dir artifacts/releases
      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: .\scripts\package.ps1 -Version $env:GITHUB_REF_NAME.TrimStart('v') -UpdateFeedUrl "https://github.com/$env:GITHUB_REPOSITORY/releases/latest/download"
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: DocVista-windows
          path: artifacts/releases/*
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = Get-ChildItem artifacts/releases -File | ForEach-Object FullName
          gh release create $env:GITHUB_REF_NAME @files --title $env:GITHUB_REF_NAME --generate-notes
